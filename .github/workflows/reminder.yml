name: Schedule Reminder

on:
  schedule:
    # 金曜日 18:00 JST (09:00 UTC)
    - cron: '0 9 * * 5'
    # 月曜日 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テストモード（@everyoneなしで送信）'
        required: false
        type: boolean
        default: false

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SCHEDULE_CHANNEL_ID: ${{ secrets.SCHEDULE_CHANNEL_ID }}
          REMINDER_CHANNEL_ID: ${{ secrets.REMINDER_CHANNEL_ID }}
          TZ: Asia/Tokyo
        run: |
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            python main.py --test force-no-mention
          else
            python main.py
          fi
